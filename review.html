<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 - Dynamic Web Fundamentals - Michelangelo Pezzini. Web development project using HTML, CSS, and JavaScript.">
  <meta name="author" content="Michelangelo Pezzini">
  <title>Review Confirmation</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <h1>Review Confirmation</h1>
  <p>Thank you for submitting your review!</p>
  <p id="reviewCount"></p>

  <footer>
    <p>©<span id="currentyear"></span> Michelangelo Pezzini | Brazil</p>
    <span id="lastModified"></span>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("currentyear").textContent = new Date().getFullYear();

      document.getElementById("lastModified").textContent = "Last Modified: " + document.lastModified;
    });


    let reviewCount = localStorage.getItem('reviewCount') || 0;
    reviewCount++;
    localStorage.setItem('reviewCount', reviewCount);
    document.getElementById('reviewCount').textContent =
      'You have submitted ' + reviewCount + ' reviews.';
  </script>
</body>

</html>
