<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 - Dynamic Web Fundamentals - Michelangelo Pezzini. Web development project using HTML, CSS, and JavaScript.">
  <meta name="author" content="Michelangelo Pezzini">
  <title>Product Review Form</title>
  <link rel="stylesheet" href="styles/form.css">
  <script defer src="scripts/main.js"></script>
</head>

<body>
  <h1>Product Review Form</h1>
  <form action="review.html" method="get">
    <label for="product">Product Name:</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product ...</option>
      <!--The option I create on the js-->>
    </select><br><br>

    <fieldset>
      <legend>Overall Rating:</legend>
      <label for="rating1">☆</label>
      <input type="radio" id="rating1" name="rating" value="1" required>
      <label for="rating2">☆☆</label>
      <input type="radio" id="rating2" name="rating" value="2" required>
      <label for="rating3">☆☆☆</label>
      <input type="radio" id="rating3" name="rating" value="3" required>
      <label for="rating4">☆☆☆☆</label>
      <input type="radio" id="rating4" name="rating" value="4" required>
      <label for="rating5">☆☆☆☆☆</label>
      <input type="radio" id="rating5" name="rating" value="5" required>
    </fieldset><br>

    <label for="installDate">Date of Installation:</label>
    <input type="date" id="installDate" name="installDate" required><br><br>

    <fieldset>
      <legend>Useful Features (Check all that apply):</legend>
      <input type="checkbox" id="feature1" name="features" value="durability">
      <label for="feature1">Durability</label><br>
      <input type="checkbox" id="feature2" name="features" value="portability">
      <label for="feature2">Portability</label><br>
      <input type="checkbox" id="feature3" name="features" value="batteryLife">
      <label for="feature3">Battery Life</label><br>
      <input type="checkbox" id="feature4" name="features" value="design">
      <label for="feature4">Design</label><br>
    </fieldset><br>

    <label for="reviewText">Written Review (Optional):</label><br>
    <textarea id="reviewText" name="reviewText" rows="4" cols="50"></textarea><br><br>

    <label for="username">User Name (Optional):</label>
    <input type="text" id="username" name="username"><br><br>

    <input type="submit" value="Submit">
  </form>

  <footer>
    <p>Common footer content</p>
  </footer>

</body>

</html>
